services:
  - type: web
    name: x-celerate-backend
    env: node
    region: singapore
    rootDir: apps/backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
